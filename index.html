<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>website</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body style="background-color: rgb(255, 87, 87);">
    <style>
        body {
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        .content {
            padding: 2rem 50px;
            max-width: 1200px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(255, 60, 60);
            padding: 1rem 2rem;
            color: #ffbbbb;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color:#ffa8a8
        }

        .bottom-right {
            position: fixed;
            bottom: 0px;
            right: 20px;
            width: 300px;
            z-index: 1000;
        }

        .bottom-right-peek:hover {
            bottom: 0px;
            transform: scale(1.05);
        }

        .teto-container {
        position: fixed;
        bottom: 0;
        right: 20px;
        width: 300px;
        height: 120px; 
        z-index: 1000;
        }

        .bottom-right-peek {
            position: absolute;
            bottom: -215px; 
            right: 0;
            width: 300px;
            transition: bottom 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55), 
                        transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            pointer-events: none;
        }

        .teto-container:hover .bottom-right-peek {
            bottom: -10px;
            transform: scale(1.05);
        }
    </style>

    <nav class="navbar">
        <ul class="nav-links">
            <li>
                <a href="index.html">
                    <img src="assets/miku.webp" alt="miku" style="width: 30; height: 30px; margin-right: 6px; vertical-align: middle;">
                    Home
                </a>
            </li>
            <li>
                <a href="about.html">
                    <img src="assets/neru.webp" alt="neru" style="width: 30; height: 30px; margin-right: 6px; vertical-align: middle;">
                    About
                </a>
            </li>
        </ul>
        <div class="icon">
            <img src="assets/teto.webp" alt="icon" width="40">
        </div>
    </nav>

    <div class="content">
        <h1>ok</h1>
        <h2>yes</h2>
        <p>okok</p>
    </div>

    <div class="teto-container">
        <img src="assets/teto2.png" class="bottom-right-peek" alt="Teto" width="300" height="300">
    </div>
    
    </body>
</html>
